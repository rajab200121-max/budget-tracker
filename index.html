<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Budget Tracker Premium</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
    body { background-color: #3193d9ff; padding: 20px; display: flex; justify-content: center; }
    .container { width: 100%; max-width: 450px; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    h2 { text-align: center; margin-bottom: 20px; color: #333; }

    .saldo-box { background: #2ecc71; color: white; padding: 15px; border-radius: 10px; text-align: center; margin-bottom: 15px; }
    .saldo-box.sering-jajan { background: #e74c3c; }
    .saldo-box h3 { font-size: 28px; margin-top: 5px; }

    .detail-box { display: flex; gap: 10px; margin-bottom: 20px; }
    .sub-box { flex: 1; padding: 10px; border-radius: 8px; color: white; text-align: center; }
    .sub-box p { font-size: 12px; opacity: 0.9; }
    .sub-box h5 { font-size: 16px; margin-top: 3px; }
    .sub-box.plus { background-color: #2ecc71; }
    .sub-box.minus { background-color: #e74c3c; }

    .chart-container { width: 100%; max-width: 210px; margin: 0 auto 25px auto; }

    .form-group { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
    input, select, button { padding: 12px; border-radius: 8px; border: 1px solid #ddd; font-size: 15px; outline: none; }
    input:focus, select:focus { border-color: #2ecc71; }
    button { background: #3498db; color: white; border: none; font-weight: bold; cursor: pointer; transition: 0.2s; }
    button:hover { opacity: 0.9; }

    /* FILTER TANGGAL */
    .filter-section {
      background: #f0f8ff;
      border: 1px solid #d0e8ff;
      border-radius: 10px;
      padding: 14px;
      margin-bottom: 20px;
    }
    .filter-section h4 { color: #3498db; margin-bottom: 10px; font-size: 14px; }
    .filter-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .filter-row label { font-size: 12px; color: #666; width: 100%; }
    .filter-row input[type="date"] { flex: 1; padding: 8px 10px; font-size: 13px; }
    .filter-row select { flex: 1; padding: 8px 10px; font-size: 13px; }
    .btn-filter { background: #3498db; color: white; padding: 8px 14px; font-size: 13px; border-radius: 8px; border: none; cursor: pointer; white-space: nowrap; }
    .btn-reset { background: #95a5a6; color: white; padding: 8px 14px; font-size: 13px; border-radius: 8px; border: none; cursor: pointer; white-space: nowrap; }
    .filter-info { font-size: 12px; color: #888; margin-top: 8px; text-align: center; }

    h4.riwayat-title { margin-bottom: 10px; color: #555; }
    .list-transaksi { list-style: none; display: flex; flex-direction: column; gap: 10px; }
    .item-transaksi { display: flex; justify-content: space-between; padding: 12px; border-radius: 8px; background: #f9f9f9; border-left: 5px solid #2ecc71; }
    .item-transaksi.pengeluaran { border-left-color: #e74c3c; }
    .hapus-btn { background: none; border: none; color: #aaa; cursor: pointer; font-weight: bold; padding: 0; }
    .hapus-btn:hover { color: #e74c3c; background: none; }

    .empty-filter { text-align: center; padding: 20px; color: #aaa; font-size: 14px; }
  </style>
</head>
<body>
<div class="container">
  <h2>Budget Tracker 💰</h2>

  <div class="saldo-box" id="saldoBox">
    <p>Sisa Saldo Anda</p>
    <h3 id="totalSaldo">Rp 0</h3>
  </div>

  <div class="detail-box">
    <div class="sub-box plus"><p>Total Masuk</p><h5 id="totalMasuk">Rp 0</h5></div>
    <div class="sub-box minus"><p>Total Keluar</p><h5 id="totalKeluar">Rp 0</h5></div>
  </div>

  <div class="chart-container">
    <canvas id="grafikKeuangan"></canvas>
  </div>

  <div class="form-group">
    <input type="text" id="namaTransaksi" placeholder="Contoh: Gaji, Beli Kopi..." />
    <input type="number" id="jumlahUang" placeholder="Jumlah Uang (Rp)..." />
    <select id="jenisTransaksi">
      <option value="pemasukan">Pemasukan (+)</option>
      <option value="pengeluaran">Pengeluaran (-)</option>
    </select>
    <button onclick="tambahTransaksi()">Catat Transaksi</button>
  </div>

  <!-- FILTER TANGGAL -->
  <div class="filter-section">
    <h4>🔍 Filter Riwayat</h4>
    <div class="filter-row">
      <label>Rentang Tanggal</label>
      <input type="date" id="filterDari" />
      <span style="font-size:13px;color:#888;align-self:center;">s/d</span>
      <input type="date" id="filterSampai" />
    </div>
    <div class="filter-row" style="margin-top:8px;">
      <label>Jenis Transaksi</label>
      <select id="filterJenis">
        <option value="semua">Semua</option>
        <option value="pemasukan">Pemasukan saja</option>
        <option value="pengeluaran">Pengeluaran saja</option>
      </select>
      <button class="btn-filter" onclick="terapkanFilter()">Terapkan</button>
      <button class="btn-reset" onclick="resetFilter()">Reset</button>
    </div>
    <div class="filter-info" id="filterInfo"></div>
  </div>

  <h4 class="riwayat-title">Riwayat Keuangan</h4>
  <ul class="list-transaksi" id="riwayatList"></ul>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
  let dataKeuangan = JSON.parse(localStorage.getItem('dataKeuanganLocal')) || [];
  let dompetChart;
  let filterAktif = { dari: '', sampai: '', jenis: 'semua' };

  function buatGrafikAwal() {
    const ctx = document.getElementById('grafikKeuangan').getContext('2d');
    dompetChart = new Chart(ctx, {
      type: 'doughnut',
      data: {
        labels: ['Total Masuk', 'Total Keluar'],
        datasets: [{ data: [0, 0], backgroundColor: ['#2ecc71', '#e74c3c'], borderWidth: 2 }]
      },
      options: { responsive: true, plugins: { legend: { position: 'bottom' } } }
    });
  }

  buatGrafikAwal();
  hitungDanRender();

  function tambahTransaksi() {
    const nama = document.getElementById('namaTransaksi').value.trim();
    const jumlah = parseFloat(document.getElementById('jumlahUang').value);
    const jenis = document.getElementById('jenisTransaksi').value;
    if (!nama || isNaN(jumlah) || jumlah <= 0) { alert("Mohon isi nama transaksi dan jumlah uang dengan benar! 😉"); return; }

    dataKeuangan.push({
      id: Date.now(), nama, jumlah, jenis,
      tanggalISO: new Date().toISOString().split('T')[0],
      tanggal: new Date().toLocaleDateString('id-ID', { year:'numeric', month:'long', day:'numeric', hour:'2-digit', minute:'2-digit' })
    });

    localStorage.setItem('dataKeuanganLocal', JSON.stringify(dataKeuangan));
    document.getElementById('namaTransaksi').value = '';
    document.getElementById('jumlahUang').value = '';
    hitungDanRender();
  }

  function hapusTransaksi(id) {
    dataKeuangan = dataKeuangan.filter(t => t.id !== id);
    localStorage.setItem('dataKeuanganLocal', JSON.stringify(dataKeuangan));
    hitungDanRender();
  }

  function terapkanFilter() {
    filterAktif.dari   = document.getElementById('filterDari').value;
    filterAktif.sampai = document.getElementById('filterSampai').value;
    filterAktif.jenis  = document.getElementById('filterJenis').value;
    hitungDanRender();
  }

  function resetFilter() {
    filterAktif = { dari: '', sampai: '', jenis: 'semua' };
    document.getElementById('filterDari').value   = '';
    document.getElementById('filterSampai').value = '';
    document.getElementById('filterJenis').value  = 'semua';
    hitungDanRender();
  }

  function dataYangDifilter() {
    return dataKeuangan.filter(t => {
      const tgl = t.tanggalISO || '';
      if (filterAktif.dari   && tgl < filterAktif.dari)   return false;
      if (filterAktif.sampai && tgl > filterAktif.sampai) return false;
      if (filterAktif.jenis !== 'semua' && t.jenis !== filterAktif.jenis) return false;
      return true;
    });
  }

  function hitungDanRender() {
    // Hitung saldo TOTAL (tidak terpengaruh filter)
    let saldo = 0, totalPemasukan = 0, totalPengeluaran = 0;
    dataKeuangan.forEach(t => {
      if (t.jenis === 'pemasukan') { saldo += t.jumlah; totalPemasukan += t.jumlah; }
      else { saldo -= t.jumlah; totalPengeluaran += t.jumlah; }
    });

    document.getElementById('totalSaldo').textContent  = 'Rp ' + saldo.toLocaleString('id-ID');
    document.getElementById('totalMasuk').textContent  = 'Rp ' + totalPemasukan.toLocaleString('id-ID');
    document.getElementById('totalKeluar').textContent = 'Rp ' + totalPengeluaran.toLocaleString('id-ID');
    dompetChart.data.datasets[0].data = [totalPemasukan, totalPengeluaran];
    dompetChart.update();
    document.getElementById('saldoBox').classList.toggle('sering-jajan', saldo < 0);

    // Render LIST berdasarkan filter
    const filtered = dataYangDifilter();
    const listElement = document.getElementById('riwayatList');
    listElement.innerHTML = '';

    // Info filter aktif
    const adaFilter = filterAktif.dari || filterAktif.sampai || filterAktif.jenis !== 'semua';
    const infoEl = document.getElementById('filterInfo');
    if (adaFilter) {
      infoEl.textContent = `Menampilkan ${filtered.length} transaksi dari ${dataKeuangan.length} total`;
    } else {
      infoEl.textContent = '';
    }

    if (filtered.length === 0) {
      listElement.innerHTML = '<div class="empty-filter">📭 Tidak ada transaksi ditemukan</div>';
      return;
    }

    // Tampilkan dari terbaru
    [...filtered].reverse().forEach(t => {
      const formatUang = t.jumlah.toLocaleString('id-ID');
      const simbol = t.jenis === 'pemasukan' ? '+' : '-';
      const kelasCSS = t.jenis === 'pemasukan' ? 'pemasukan' : 'pengeluaran';
      listElement.innerHTML += `
        <li class="item-transaksi ${kelasCSS}">
          <div>
            <strong>${t.nama}</strong><br>
            <small style="color:#666;font-size:11px;">📅 ${t.tanggal}</small><br>
            <small style="color:#888;font-weight:bold;">${simbol} Rp ${formatUang}</small>
          </div>
          <button class="hapus-btn" onclick="hapusTransaksi(${t.id})">❌</button>
        </li>`;
    });
  }
</script>
</body>
</html>
